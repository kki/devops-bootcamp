---
# Роль: docker
# Устанавливает Docker CE на Amazon Linux 2023

- name: Установить yum-utils
  yum:
    name: yum-utils
    state: present
  tags: install

- name: Добавить репозиторий Docker
  command: yum-config-manager --add-repo https://download.docker.com/linux/rhel/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo   # пропустить если файл уже есть
  tags: install

- name: Установить Docker
  yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
  tags: install

- name: Запустить и включить Docker
  service:
    name: docker
    state: started
    enabled: yes
  tags: install

- name: Добавить ec2-user в группу docker
  user:
    name: ec2-user
    groups: docker
    append: yes   # добавить группу, не заменить существующие
  tags: install
